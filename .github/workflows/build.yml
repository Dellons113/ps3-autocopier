name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PS3DEV: /usr/local/ps3dev
    
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake bison flex texinfo libncurses5-dev patch zlib1g-dev libtool libtool-bin git curl wget libssl-dev pkg-config libelf-dev libgmp-dev libmpfr-dev libmpc-dev subversion

    - name: 3. Set Environment Paths
      run: |
        # Buat direktori
        sudo mkdir -p /usr/local/ps3dev
        sudo chown -R $USER /usr/local/ps3dev
        
        # Masukkan path ke dalam environment GitHub agar terbaca oleh skrip selanjutnya
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: 4. Install PSL1GHT Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git
        cd ps3toolchain
        ./toolchain.sh

    - name: 5. Compile (Make)
      run: |
        make clean
        make

    - name: 6. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
