name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PS3DEV: /usr/local/ps3dev
      PSL1GHT: /usr/local/ps3dev/psl1ght
    
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Install Dependencies (Fix Python)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake bison flex texinfo libncurses5-dev patch zlib1g-dev libtool libtool-bin git curl wget libssl-dev pkg-config libelf-dev libgmp-dev [...]

    - name: 3. Set Environment Paths
      run: |
        sudo mkdir -p /usr/local/ps3dev
        sudo mkdir -p /usr/local/ps3dev/psl1ght
        sudo chown -R $USER /usr/local/ps3dev
        
        echo "PS3DEV=$PS3DEV" >> $GITHUB_ENV
        echo "PSL1GHT=$PSL1GHT" >> $GITHUB_ENV
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: 4. Install PSL1GHT Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git
        cd ps3toolchain
        chmod +x toolchain.sh
        
        # Run the toolchain script with error handling
        bash -x ./toolchain.sh 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "Toolchain build failed with exit code $BUILD_EXIT"
          tail -200 build.log
          exit $BUILD_EXIT
        fi
        
        # Verify PSL1GHT installation - check correct path
        echo "Checking PSL1GHT installation..."
        if [ ! -d "$PS3DEV/ppu/include" ]; then
          echo "ERROR: PSL1GHT headers not found at $PS3DEV/ppu/include"
          echo "Checking what was installed:"
          ls -la $PS3DEV/ppu/include/ 2>/dev/null || echo "Include directory not found"
          exit 1
        fi
        
        echo "PSL1GHT headers found successfully:"
        ls -la $PS3DEV/ppu/include/ | head -20

    - name: 5. Compile (Make)
      run: |
        export PS3DEV=/usr/local/ps3dev
        export PSL1GHT=/usr/local/ps3dev/psl1ght
        export PATH=$PATH:/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:/usr/local/ps3dev/spu/bin
        
        # Debug: Show include paths
        echo "PS3DEV: $PS3DEV"
        echo "PSL1GHT: $PSL1GHT"
        echo "Include path: $PSL1GHT/ppu/include"
        
        # Verify toolchain is available
        which powerpc64-ps3-elf-gcc || (echo "GCC not found" && exit 1)
        
        make clean
        make

    - name: 6. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
