name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # PERBAIKAN: Menggunakan Image Publik yang pasti ada dan stabil
    container:
      image: mlafeldt/ps3dev:latest

    steps:
    - name: 1. Mengambil Source Code
      uses: actions/checkout@v4

    - name: 2. Proses Build (Compile)
      run: |
        echo "Memulai kompilasi main.c menjadi SPRX..."
        make clean
        make

    - name: 3. Mengekstrak File SPRX
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
