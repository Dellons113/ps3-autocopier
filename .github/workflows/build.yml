name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Install PS3 Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake bison flex texinfo libncurses5-dev patch zlib1g-dev libtool git curl wget libssl-dev pkg-config

    - name: 3. Install PSL1GHT Toolchain (Manual)
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git
        cd ps3toolchain
        ./toolchain.sh
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH

    - name: 4. Compile (Make)
      run: |
        make clean
        make

    - name: 5. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
