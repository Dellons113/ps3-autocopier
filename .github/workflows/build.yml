name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Mengizinkan kompilasi manual lewat tombol

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Memanggil image Docker resmi dari komunitas ps3dev
    container:
      image: ps3dev/ps3toolchain:latest

    steps:
    - name: 1. Mengambil Source Code (Checkout)
      uses: actions/checkout@v4

    - name: 2. Proses Build (Compile)
      run: |
        echo "Memulai kompilasi main.c menjadi SPRX..."
        make clean
        make

    - name: 3. Mengekstrak File SPRX (Artifact Upload)
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
