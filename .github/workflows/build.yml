name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Menggunakan ubuntu-22.04 agar lebih kompatibel dengan skrip PS3Dev lama
    runs-on: ubuntu-22.04
    
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Install Dependencies (Lengkap)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake bison flex texinfo libncurses5-dev patch zlib1g-dev libtool git curl wget libssl-dev pkg-config libelf-dev libgmp-dev libmpfr-dev libmpc-dev subversion

    - name: 3. Install PSL1GHT Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git
        cd ps3toolchain
        ./toolchain.sh

    - name: 4. Compile (Make)
      env:
        PS3DEV: /usr/local/ps3dev
        PATH: /usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:/usr/local/ps3dev/spu/bin:$PATH
      run: |
        make clean
        make

    - name: 5. Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: restorer-plugin
        path: restorer.sprx
