          # build.sh
          cat > build.sh <<'BS'
#!/bin/sh
set -e
: ${PS3DEV:=/opt/ps3dev}
: ${CROSS_COMPILE:=ppu-lv2-}
echo "PS3DEV=$PS3DEV"
echo "CROSS_COMPILE=$CROSS_COMPILE"
if ! command -v ${CROSS_COMPILE}gcc >/dev/null 2>&1; then
  echo "Error: ${CROSS_COMPILE}gcc not found" >&2
  exit 2
fi
if ! command -v prxgen >/dev/null 2>&1 && ! command -v sprxlinker >/dev/null 2>&1; then
  echo "Warning: prxgen/sprxlinker not found. SPRX generation may fail." >&2
fi
make "$@"
BS
          chmod +x build.sh

      - name: Add CI workflows (build-toolchain + ci-build-selfhost)
        run: |
          mkdir -p .github/workflows
          cat > .github/workflows/build-toolchain.yml <<'WT'
name: PS3 Toolchain update & build

on:
  push:
    branches: [ feat/toolchain-sprx, feat/toolchain-updates, main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PS3DEV: /opt/ps3dev
      CROSS_COMPILE: ppu-lv2-

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git build-essential wget curl xz-utils python3 python3-pip \
            autoconf automake libtool pkg-config texinfo gawk bison flex gperf \
            libncurses5-dev libssl-dev libglib2.0-dev libxml2-dev zlib1g-dev

      - name: Setup PS3 toolchain (prebuilt or build from source)
        run: |
          set -e
          echo "PS3DEV=$PS3DEV"
          if [ -n "${{ secrets.PS3DEV_TARBALL_URL }}" ]; then
            echo "Using prebuilt toolchain from secret PS3DEV_TARBALL_URL"
            sudo mkdir -p /opt
            sudo sh -c "curl -fsSL '${{ secrets.PS3DEV_TARBALL_URL }}' | tar -xz -C /opt"
          else
            echo "No prebuilt tarball provided; cloning ps3toolchain (may be very slow)"
            sudo mkdir -p /opt/ps3toolchain
            sudo chown $USER:$USER /opt/ps3toolchain
            git clone https://github.com/ps3dev/ps3toolchain.git /opt/ps3toolchain
            cd /opt/ps3toolchain
            ./toolchain.sh || { echo "toolchain build failed or timed out"; exit 1; }
          fi

      - name: Ensure toolchain bin in PATH
        run: |
          if [ -d "/opt/ps3dev/bin" ]; then
            echo "Found /opt/ps3dev/bin"
            export PATH=/opt/ps3dev/bin:$PATH
          elif [ -d "/opt/ps3toolchain/bin" ]; then
            echo "Found /opt/ps3toolchain/bin"
            export PATH=/opt/ps3toolchain/bin:$PATH
          else
            echo "Warning: toolchain bin not found under /opt; build may fail"
          fi
          ppu-lv2-gcc --version || true

      - name: Build project (ELF -> SPRX -> SELF)
        run: |
          make || { echo "make failed"; exit 1; }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build-artifacts
          path: |
            *.elf
            *.sprx
            *.self
WT

          cat > .github/workflows/ci-build-selfhost.yml <<'WS'
name: PS3 Build (self-hosted)

on:
  push:
    branches:
      - feat/toolchain-sprx
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build on self-hosted PS3 runner
    runs-on: [self-hosted, ps3]
    env:
      PS3DEV: /opt/ps3dev
      CROSS_COMPILE: ppu-lv2-

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure toolchain present
        run: |
          set -e
          CC=${CROSS_COMPILE:-ppu-lv2-}gcc
          if ! command -v "$CC" >/dev/null 2>&1; then
            echo "ERROR: cross-compiler ($CC) not found on runner"
            exit 1
          fi
          if ! command -v prxgen >/dev/null 2>&1 && ! command -v sprxlinker >/dev/null 2>&1; then
            echo "WARNING: prxgen/sprxlinker not found; SPRX may not be generated"
          fi

      - name: Build
        run: |
          make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build-artifacts
          path: |
            *.elf
            *.sprx
            *.self
WS

      - name: Commit changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(ci): add PS3 build files and CI workflows (auto-setup)"
          fi

      - name: Push branch (use PERSONAL_TOKEN if set, else TOKEN_USER)
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          TOKEN_USER: ${{ secrets.TOKEN_USER }}
        run: |
          TOKEN="${PERSONAL_TOKEN:-${TOKEN_USER}}"
          if [ -z "$TOKEN" ]; then
            echo "No token available (PERSONAL_TOKEN or TOKEN_USER). Cannot push." >&2
            exit 1
          fi
          REPO="${{ github.repository }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
          git push --set-upstream origin "$BRANCH" -o ci.skip

      - name: Create Pull Request (if PERSONAL_TOKEN present)
        run: |
          if [ -n "${{ secrets.PERSONAL_TOKEN }}" ]; then
            TOKEN="${{ secrets.PERSONAL_TOKEN }}"
            REPO="${{ github.repository }}"
            TITLE="${{ env.PR_TITLE }}"
            BODY="${{ env.PR_BODY }}"
            PAYLOAD=$(jq -n --arg t "$TITLE" --arg head "$BRANCH" --arg base "main" --arg b "$BODY" '{title:$t, head:$head, base:$base, body:$b}')
            RESP=$(curl -s -X POST -H "Authorization: token ${TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO}/pulls" -d "$PAYLOAD")
            echo "$RESP" | jq -r '.html_url // .message' || true
          else
            echo "PERSONAL_TOKEN not set; skipping PR creation."
          fi
