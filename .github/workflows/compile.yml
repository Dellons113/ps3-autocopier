* name: Verify Environment
  run: |
  export PS3DEV=/usr/local/ps3dev
  export PSL1GHT=/usr/local/ps3dev
  export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

  echo "========================"
  echo "PS3DEV=$PS3DEV"
  echo "PSL1GHT=$PSL1GHT"
  echo "PATH=$PATH"
  echo "========================"

  ls -la /usr/local/ps3dev
  ls -la /usr/local/ps3dev/bin
  ls -la /usr/local/ps3dev/ppu
  ls -la /usr/local/ps3dev/ppu/bin

* name: Clone Toolchain
  run: |
  git clone https://github.com/ps3dev/ps3toolchain.git

* name: Build Toolchain
  run: |
  export PS3DEV=/usr/local/ps3dev
  export PSL1GHT=/usr/local/ps3dev
  export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

  cd ps3toolchain

  chmod +x toolchain.sh || true

  ls -la
  pwd

  ./toolchain.sh

* name: Verify Installed Tools
  run: |
  export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

  echo "===== GCC ====="
  which powerpc64-ps3-elf-gcc || true

  echo "===== PRX TOOLS ====="
  which sprxlinker || true
  which prxgen || true
  which make_fself || true

  echo "===== PS3DEV CONTENT ====="
  find /usr/local/ps3dev -iname "*prx*" || true
  find /usr/local/ps3dev -iname "*sprx*" || true

* name: Build Project
  run: |
  export PS3DEV=/usr/local/ps3dev
  export PSL1GHT=/usr/local/ps3dev
  export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

  make clean || true
  make

* name: Show Build Result
  run: |
  echo "===== OUTPUT ====="

  find . -type f 
  ( 
  -name "*.elf" 
  -o -name "*.self" 
  -o -name "*.prx" 
  -o -name "*.sprx" 
  )

* name: Upload Artifact
  uses: actions/upload-artifact@v4
  with:
  name: wm-restorer-build
  path: |
  *.elf
  *.self
  *.prx
  *.sprx
