name: Build PS3 PRX Toolchain

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
env:
  PS3DEV: /usr/local/ps3dev
  PSL1GHT: /usr/local/ps3dev

steps:
  - uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        autoconf automake bison flex gcc \
        libelf-dev make texinfo libncurses5-dev \
        patch subversion wget zlib1g-dev \
        libtool libtool-bin bzip2 \
        libgmp-dev pkg-config g++ \
        libssl-dev clang \
        python3 python-is-python3 \
        python3-dev git

  - name: Build ps3toolchain
    run: |
      git clone https://github.com/ps3dev/ps3toolchain.git
      cd ps3toolchain
      chmod +x toolchain.sh
      ./toolchain.sh

  - name: Verify PRX tools
    run: |
      find $PS3DEV -iname "*sprx*"
      find $PS3DEV -iname "*prx*"
      ls -la $PS3DEV/bin
      ls -la $PS3DEV/ppu/bin
```
