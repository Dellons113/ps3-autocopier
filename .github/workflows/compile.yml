name: Build WM Restorer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PS3DEV: /usr/local/ps3dev
      PSL1GHT: /usr/local/ps3dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            make \
            gcc \
            g++ \
            autoconf \
            automake \
            bison \
            flex \
            texinfo \
            patch \
            wget \
            curl \
            pkg-config \
            libelf-dev \
            zlib1g-dev \
            libtool \
            libtool-bin \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            libssl-dev \
            python3

      - name: Create PS3DEV
        run: |
          sudo mkdir -p /usr/local/ps3dev
          sudo chown -R $USER:$USER /usr/local/ps3dev

          echo "PS3DEV READY"

          ls -la /usr/local
          ls -la /usr/local/ps3dev

      - name: Clone Toolchain
        run: |
          git clone https://github.com/ps3dev/ps3toolchain.git

      - name: Build Toolchain
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev

          cd ps3toolchain

          chmod +x toolchain.sh

          ./toolchain.sh

