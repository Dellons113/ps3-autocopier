name: Compile PS3 Project

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build PS3 Homebrew
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Menggunakan image alternatif yang mendukung linux/amd64
      - name: Compile Project with PS3 Toolchain
        run: |
          # hldtux/ps3dev-sdl2 sudah teruji mendukung environment GitHub Actions (amd64)
          docker run --rm -v ${{ github.workspace }}:/build -w /build hldtux/ps3dev-sdl2 make

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Release
          path: |
            *.pkg
            *.elf
            *.self
          if-no-files-found: warn
