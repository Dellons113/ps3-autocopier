name: Compile PS3 Project

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build PS3 Homebrew
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repository kamu
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Melakukan kompilasi menggunakan image Docker yang valid
      - name: Compile Project with PS3 Toolchain
        run: |
          # Menggunakan image 'zeldin/ps3dev-docker:latest' dari Docker Hub
          # Melakukan mount folder GitHub workspace ke /build di dalam container
          docker run --rm -v ${{ github.workspace }}:/build -w /build zeldin/ps3dev-docker:latest make

      # 3. Menyimpan hasil build (Artifacts) agar bisa di-download
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Release
          path: |
            *.pkg
            *.elf
            *.self
          if-no-files-found: warn
