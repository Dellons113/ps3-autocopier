name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build PS3 SPRX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Menjalankan Docker dengan injeksi Environment Variable yang benar
      - name: Compile SPRX with PS3 Toolchain
        run: |
          docker run --rm -v ${{ github.workspace }}:/build -w /build \
            -e PS3DEV=/usr/local/ps3dev \
            -e PSL1GHT=/usr/local/ps3dev/psl1ght \
            hldtux/ps3dev-sdl2 \
            /bin/bash -c "export PATH=\$PATH:\$PS3DEV/bin:\$PS3DEV/ppu/bin; make"

      # Menyimpan artefak berupa file SPRX, PRX, dan ELF sebagai hasil akhir
      - name: Upload SPRX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS3-SPRX-Release
          path: |
            *.sprx
            *.prx
            *.elf
          if-no-files-found: warn
