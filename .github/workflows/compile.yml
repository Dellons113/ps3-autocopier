name: Build PS3 SPRX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PS3DEV: /usr/local/ps3dev
      PSL1GHT: /usr/local/ps3dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            wget \
            curl \
            make \
            gcc \
            g++ \
            autoconf \
            automake \
            bison \
            flex \
            texinfo \
            patch \
            pkg-config \
            libelf-dev \
            zlib1g-dev \
            libtool \
            libtool-bin \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            libssl-dev \
            python3

      - name: Create PS3DEV Structure
        run: |
          sudo mkdir -p /usr/local/ps3dev
          sudo mkdir -p /usr/local/ps3dev/bin
          sudo mkdir -p /usr/local/ps3dev/ppu
          sudo mkdir -p /usr/local/ps3dev/portlibs

          sudo chown -R $USER:$USER /usr/local/ps3dev

      - name: Add PS3DEV To PATH
        run: |
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH

      - name: Verify PS3DEV
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PATH=$PS3DEV/bin:$PATH

          echo "PS3DEV=$PS3DEV"
          echo "PATH=$PATH"

          ls -la /usr/local/ps3dev
          ls -la /usr/local/ps3dev/bin

      - name: Clone PS3 Toolchain
        run: |
          git clone https://github.com/ps3dev/ps3toolchain.git

      - name: Build Toolchain
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev
          export PATH=$PS3DEV/bin:$PATH

          cd ps3toolchain

          chmod +x toolchain.sh

          ./toolchain.sh

      - name: Verify Installed Tools
        run: |
          export PATH=/usr/local/ps3dev/bin:$PATH

          echo "===== TOOLCHAIN ====="

          find /usr/local/ps3dev -iname "*prx*" || true
          find /usr/local/ps3dev -iname "*sprx*" || true

          which powerpc64-ps3-elf-gcc || true
          which sprxlinker || true
          which prxgen || true

      - name: Build Project
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev
          export PATH=$PS3DEV/bin:$PATH

          make clean || true
          make

      - name: Show Output Files
        run: |
          echo "===== BUILD OUTPUT ====="

          find . -type f \
            \( \
              -name "*.elf" \
              -o -name "*.self" \
              -o -name "*.prx" \
              -o -name "*.sprx" \
            \)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wm-restorer
          path: |
            *.elf
            *.self
            *.prx
            *.sprx
