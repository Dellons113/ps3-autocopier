name: Compile PS3 SPRX Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PS3 Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake bison flex libelf-dev libssl-dev texinfo zlib1g-dev

      - name: Setup PS3 Toolchain
        run: |
          git clone https://github.com/ps3dev/ps3dev.git /home/runner/ps3dev
          export PS3DEV=/home/runner/ps3dev
          export PATH=$PATH:$PS3DEV/bin
          # Kita hanya menginstal toolchain inti (ppu-gcc)
          cd /home/runner/ps3dev && ./toolchain.sh

      - name: Compile SPRX
        run: |
          export PS3DEV=/home/runner/ps3dev
          export PSL1GHT=/home/runner/ps3dev/portlibs/ppu
          export PATH=$PATH:$PS3DEV/bin:$PS3DEV/ppu/bin
          make

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS3-SPRX-Release
          path: |
            *.sprx
            *.prx
            *.elf
