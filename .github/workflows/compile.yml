name: Build PS3 Toolchain

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PS3DEV: /usr/local/ps3dev
      PSL1GHT: /usr/local/ps3dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            curl \
            make \
            gcc \
            g++ \
            autoconf \
            automake \
            bison \
            flex \
            texinfo \
            patch \
            pkg-config \
            libelf-dev \
            zlib1g-dev \
            libtool \
            libtool-bin \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            libssl-dev \
            python3

      - name: Create PS3DEV Structure
        run: |
          sudo mkdir -p /usr/local/ps3dev
          sudo mkdir -p /usr/local/ps3dev/bin
          sudo mkdir -p /usr/local/ps3dev/ppu
          sudo mkdir -p /usr/local/ps3dev/ppu/bin
          sudo mkdir -p /usr/local/ps3dev/portlibs

          sudo chown -R $USER:$USER /usr/local/ps3dev

      - name: Add PS3DEV Paths
        run: |
          echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH

      - name: Verify Environment
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev
          export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

          echo "========================"
          echo "PS3DEV=$PS3DEV"
          echo "PSL1GHT=$PSL1GHT"
          echo "PATH=$PATH"
          echo "========================"

          ls -la /usr/local/ps3dev
          ls -la /usr/local/ps3dev/bin
          ls -la /usr/local/ps3dev/ppu
          ls -la /usr/local/ps3dev/ppu/bin

      - name: Clone Toolchain
        run: |
          git clone https://github.com/ps3dev/ps3toolchain.git

      - name: Build Toolchain
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev
          export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

          cd ps3toolchain

          chmod +x toolchain.sh || true

          ./toolchain.sh

      - name: Verify Installed Tools
        run: |
          export PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH

          echo "===== GCC ====="
          which powerpc64-ps3-elf-gcc || true

          echo "===== PRX TOOLS ====="
          which sprxlinker || true
          which prxgen || true
          which make_fself || true

          echo "===== PS3DEV CONTENT ====="
          find /usr/local/ps3dev -iname "*prx*" || true
          find /usr/local/ps3dev -iname "*sprx*" || true

      - name: Upload Toolchain Logs
        uses: actions/upload-artifact@v4
        with:
          name: ps3-toolchain
          path: ps3toolchain
